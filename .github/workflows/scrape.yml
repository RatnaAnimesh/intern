name: Daily Internship Scraper

on:
  schedule:
    # Runs at 18:30 UTC every day (which is 12:00 AM IST)
    - cron: '30 18 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4

      - name: Run Scraper
        run: python scripts/fetch_live_internships.py

      - name: Commit and Push changes
        run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"
          git add -f frontend/public/internships.csv
          git commit -m "Automated Data Refresh: Feed updated with latest 1st-year roles" || echo "No changes to commit"
          git push
