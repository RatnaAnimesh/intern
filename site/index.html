<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Internships | BITS Pilani</title>
  <meta name="description" content="Curated technical internships for BITS Pilani students. Google STEP, Microsoft Explore, research programs, and top startup roles.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <nav id="navbar" style="opacity: 0;">
    <div class="nav-inner">
      <div class="nav-brand">
        <span class="brand-text">Internships</span>
      </div>
      <button id="theme-toggle" aria-label="Toggle theme">
        <svg id="icon-moon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
        <svg id="icon-sun" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
      </button>
    </div>
  </nav>

  <!-- Landing Experience -->
  <section id="landing">
    <div class="bg-mesh"></div>
    <div class="landing-content">
      <h1 class="landing-title">BITS PILANI<br>INTERNSHIPS</h1>
      <p class="landing-sub">The high-signal technical directory for first-year students.</p>
      <div class="scroll-indicator">
        <span>Scroll to explore</span>
        <div class="arrow"></div>
      </div>
    </div>
  </section>

  <div id="content-reveal">
    <main>
      <!-- Hero (Condensed) -->
      <section id="hero">
        <div class="hero-badges">
          <div class="hero-badge">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2L15.09 8.26L22 9.27L17 14.14L18.18 21.02L12 17.77L5.82 21.02L7 14.14L2 9.27L8.91 8.26L12 2Z"/></svg>
            <span>Curated for BITS Pilani</span>
          </div>
          <div id="result-count" class="hero-badge secondary">0 OPPORTUNITIES</div>
        </div>
      </section>

      <!-- Filters -->
      <section id="controls">
        <div id="source-filters">
          <button class="filter-btn active" data-source="all">All Roles</button>
          <button class="filter-btn" data-source="Structured Program">Structured</button>
          <button class="filter-btn" data-source="Research Program">Research</button>
          <button class="filter-btn" data-source="Open Source">Open Source</button>
          <button class="filter-btn" data-source="Startup">Startups</button>
          <button class="filter-btn" data-source="Remote">Remote</button>
        </div>
        <div id="search-wrap">
          <svg class="search-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
          <input type="text" id="search-input" placeholder="Search roles, skills, or companies..." autocomplete="off">
        </div>
      </section>

      <!-- Grid -->
      <section id="grid"></section>

      <!-- Loading State -->
      <section id="loading-state">
        <div class="loader-ring"></div>
        <p class="loader-text">Loading opportunities...</p>
      </section>

      <!-- Empty State -->
      <section id="empty-state" style="display:none">
        <div class="empty-icon">
          <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        </div>
        <h3>No matching internships</h3>
        <p>Try broader keywords or remove filters.</p>
      </section>
    </main>

    <footer>
      <p>MADE WITH ❤️ BY RATNA</p>
    </footer>
  </div>

  <!-- GSAP & ScrollTrigger -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
